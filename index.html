<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;overflow-x:hidden;}
body{background:#060f18;}

.bg-canvas{position:fixed;inset:0;z-index:0;}
#bgCanvas{width:100%;height:100%;display:block;}

.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.42;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:160px 160px;}

.container{position:relative;z-index:10;width:100%;max-width:500px;margin:0 auto;
  padding:40px 20px 52px;display:flex;flex-direction:column;align-items:center;gap:22px;}

/* Name */
.name-title{
  font-size:34px;font-weight:800;letter-spacing:-1px;
  color:#fff;text-align:center;
  transition:text-shadow 0.4s ease;
  cursor:default;user-select:none;
}

/* Glass */
.glass{
  background:linear-gradient(135deg,rgba(255,255,255,0.13) 0%,rgba(255,255,255,0.04) 100%);
  border:1px solid rgba(255,255,255,0.16);border-radius:28px;
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  box-shadow:0 0 0 0.5px rgba(255,255,255,0.07) inset,0 8px 40px rgba(0,0,0,0.45);
  position:relative;overflow:hidden;
}
.glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);}

/* Clock */
.cw-wrap{width:100%;cursor:pointer;user-select:none;}
.cw-inner{padding:24px 30px 20px;}
.time-big{font-size:58px;font-weight:700;letter-spacing:-2px;color:#fff;line-height:1;
  font-variant-numeric:tabular-nums;transition:text-shadow 0.4s;}
.date-sm{font-size:14px;color:rgba(255,255,255,0.5);margin-top:6px;letter-spacing:0.3px;}
.tap-pill{display:inline-block;margin-top:10px;padding:4px 14px;border-radius:20px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.13);
  font-size:10px;color:rgba(255,255,255,0.32);letter-spacing:1px;text-transform:uppercase;}
.wx-icon-big{font-size:44px;line-height:1;margin-bottom:4px;display:block;}
.wx-temp-big{font-size:58px;font-weight:700;letter-spacing:-2px;color:#fff;line-height:1;transition:text-shadow 0.4s;}
.wx-city{font-size:15px;font-weight:500;color:rgba(255,255,255,0.65);margin-top:5px;}
.wx-desc{font-size:13px;color:rgba(255,255,255,0.38);margin-top:2px;}

/* Grid */
.social-grid{width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:15px;}

.social-btn{display:flex;flex-direction:column;align-items:center;gap:9px;
  cursor:pointer;text-decoration:none;border:none;background:none;
  animation:float var(--fd,3s) ease-in-out infinite alternate;}
@keyframes float{0%{transform:translateY(0);}100%{transform:translateY(-10px);}}

.bubble{
  width:68px;height:68px;border-radius:22px;
  display:flex;align-items:center;justify-content:center;position:relative;
  background:linear-gradient(145deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0.05) 100%);
  border:1px solid rgba(255,255,255,0.22);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  transition:transform 0.18s cubic-bezier(.34,1.56,.64,1),box-shadow 0.2s ease;
  overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.bubble::before{content:'';position:absolute;top:0;left:0;right:0;height:46%;
  background:linear-gradient(180deg,rgba(255,255,255,0.24),transparent);
  border-radius:22px 22px 0 0;pointer-events:none;z-index:2;}
.bubble::after{content:'';position:absolute;inset:0;border-radius:22px;
  background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,transparent 60%);
  pointer-events:none;z-index:2;}

.social-btn:active .bubble{transform:scale(0.91);}

.pulse{position:absolute;inset:-5px;border-radius:27px;
  border:1.5px solid var(--gc,rgba(255,255,255,0.1));
  animation:pulse var(--pd,3s) ease-in-out infinite;pointer-events:none;}
@keyframes pulse{0%,100%{opacity:0.25;transform:scale(1);}50%{opacity:0.7;transform:scale(1.13);}}

.lbl{font-size:11px;font-weight:500;color:rgba(255,255,255,0.55);letter-spacing:0.2px;text-align:center;}

svg.ic{width:40px;height:40px;position:relative;z-index:3;}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);
  background:rgba(20,24,28,0.94);border:1px solid rgba(255,255,255,0.15);
  border-radius:50px;padding:10px 22px;font-size:13px;font-weight:500;color:#fff;
  backdrop-filter:blur(20px);z-index:999;opacity:0;
  transition:opacity 0.3s,transform 0.3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Panel */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;
  backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity 0.3s;}
.panel-overlay.open{opacity:1;pointer-events:all;}
.panel{position:fixed;bottom:0;left:0;right:0;z-index:201;
  background:linear-gradient(180deg,rgba(14,24,18,0.98),rgba(6,12,22,0.99));
  border-top:1px solid rgba(255,255,255,0.14);border-radius:28px 28px 0 0;
  padding:18px 22px 44px;
  transform:translateY(100%);transition:transform 0.42s cubic-bezier(0.77,0,0.18,1);}
.panel.open{transform:translateY(0);}
.panel-handle{width:38px;height:4px;border-radius:2px;background:rgba(255,255,255,0.18);margin:0 auto 18px;}
.panel-title{font-size:16px;font-weight:600;color:rgba(255,255,255,0.85);margin-bottom:16px;text-align:center;letter-spacing:0.3px;}

.grad-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:6px;}
.grad-swatch{height:42px;border-radius:14px;cursor:pointer;
  border:2px solid transparent;transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s;}
.grad-swatch.active{border-color:rgba(255,255,255,0.85);transform:scale(1.08);box-shadow:0 0 16px rgba(255,255,255,0.2);}
.grad-swatch:hover:not(.active){transform:scale(1.04);}

.cust-btn{width:100%;padding:13px;border-radius:20px;

  backdrop-filter:blur(20px);transition:transform 0.15s,box-shadow 0.15s;}
.cust-btn:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(80,255,140,0.12);}
</style>
</head>

<!-- Panel -->
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="panel-title">Choose Background Vibe</div>
  <div class="grad-grid" id="gradGrid"></div>
</div>

<script>
// ── Canvas animated background ──
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W,H;

const PALETTES = [
  // 0 green-blue (default)
  [{c:[15,160,70],x:.1,y:.1},{c:[8,60,180],x:.85,y:.85},{c:[0,180,100],x:.5,y:.45}],
  // 1 purple-teal
  [{c:[120,30,200],x:.1,y:.1},{c:[20,60,180],x:.85,y:.8},{c:[0,180,80],x:.5,y:.5}],
  // 2 red-amber
  [{c:[200,30,30],x:.1,y:.2},{c:[180,80,0],x:.8,y:.8},{c:[100,0,180],x:.5,y:.4}],
  // 3 ocean
  [{c:[0,120,200],x:.15,y:.1},{c:[0,180,140],x:.8,y:.85},{c:[0,60,200],x:.5,y:.5}],
  // 4 gold-forest
  [{c:[180,150,0],x:.15,y:.1},{c:[0,160,60],x:.8,y:.8},{c:[0,80,180],x:.5,y:.45}],
  // 5 rose-violet
  [{c:[200,30,120],x:.1,y:.1},{c:[80,0,200],x:.85,y:.8},{c:[0,160,160],x:.5,y:.5}],
  // 6 arctic
  [{c:[0,180,220],x:.1,y:.1},{c:[0,120,200],x:.85,y:.8},{c:[100,220,255],x:.5,y:.3}],
  // 7 sunset
  [{c:[255,80,0],x:.1,y:.1},{c:[200,0,80],x:.85,y:.85},{c:[255,160,0],x:.5,y:.3}],
  // 8 monochrome
  [{c:[80,80,100],x:.1,y:.1},{c:[40,40,60],x:.85,y:.8},{c:[120,120,140],x:.5,y:.5}],
  // 9 neon green
  [{c:[0,255,80],x:.15,y:.1},{c:[0,180,60],x:.8,y:.85},{c:[0,100,180],x:.5,y:.5}],
];

const BG_BASE = [
  '#050f09','#0e0520','#120404','#040e14','#090900','#100312','#020e14','#120300','#060608','#001a05'
];

const SWATCH_GRADS = [
  'linear-gradient(135deg,#0d3320,#021830,#040e2a)',
  'linear-gradient(135deg,#1a0533,#0a1a40,#001a0f)',
  'linear-gradient(135deg,#260606,#1a0a00,#0a0a26)',
  'linear-gradient(135deg,#001a26,#003326,#001040)',
  'linear-gradient(135deg,#1a1400,#0a260f,#001a33)',
  'linear-gradient(135deg,#260a1a,#0a0a26,#001a1a)',
  'linear-gradient(135deg,#001a26,#003366,#004466)',
  'linear-gradient(135deg,#331500,#260010,#331a00)',
  'linear-gradient(135deg,#111118,#1a1a22,#0a0a14)',
  'linear-gradient(135deg,#002200,#003322,#001440)',
];

let curPal = 0;
let orbs = [];

// Build swatch UI
const grid = document.getElementById('gradGrid');
SWATCH_GRADS.forEach((g,i)=>{
  const d = document.createElement('div');
  d.className = 'grad-swatch' + (i===0?' active':'');
  d.style.background = g;
  d.onclick = ()=>pickPal(i,d);
  grid.appendChild(d);
});

function mkOrbs(pal){
  orbs = PALETTES[pal].map(o=>({
    r:o.c[0],g:o.c[1],b:o.c[2],
    x:W*o.x,y:H*o.y,
    rad:Math.min(W,H)*0.58,
    vx:(Math.random()-0.5)*0.25,
    vy:(Math.random()-0.5)*0.25,
  }));
}

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  mkOrbs(curPal);
}
window.addEventListener('resize',resize);resize();

// Track dominant color for glow effects
let domColor = [15,160,70];

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = BG_BASE[curPal];
  ctx.fillRect(0,0,W,H);
  orbs.forEach(o=>{
    const gr = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.rad);
    gr.addColorStop(0,`rgba(${o.r},${o.g},${o.b},0.28)`);
    gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
    o.x+=o.vx;o.y+=o.vy;
    if(o.x<-o.rad*.5||o.x>W+o.rad*.5)o.vx*=-1;
    if(o.y<-o.rad*.5||o.y>H+o.rad*.5)o.vy*=-1;
  });
  // compute avg color for name glow
  domColor = [
    Math.round(orbs.reduce((s,o)=>s+o.r,0)/orbs.length),
    Math.round(orbs.reduce((s,o)=>s+o.g,0)/orbs.length),
    Math.round(orbs.reduce((s,o)=>s+o.b,0)/orbs.length),
  ];
  updateNameGlow();
  requestAnimationFrame(draw);
}
draw();

function updateNameGlow(){
  const [r,g,b] = domColor;
  const el = document.getElementById('nameTitle');
  el.style.textShadow = `0 0 40px rgba(${r},${g},${b},0.75), 0 0 80px rgba(${r},${g},${b},0.35), 0 0 120px rgba(${r},${g},${b},0.15)`;
  el.style.color = '#fff';
}

function pickPal(idx,el){
  curPal=idx;
  mkOrbs(idx);
  document.querySelectorAll('.grad-swatch').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
}

// ── Bubble hover glow (cursor proximity) ──
document.querySelectorAll('.bubble').forEach(bubble=>{
  const gc = bubble.dataset.glow||'255,255,255';
  bubble.addEventListener('mousemove',e=>{
    const r = bubble.getBoundingClientRect();
    const cx = r.left+r.width/2, cy = r.top+r.height/2;
    const dist = Math.sqrt((e.clientX-cx)**2+(e.clientY-cy)**2);
    const maxDist = 120;
    const intensity = Math.max(0, 1 - dist/maxDist);
    const spread = 20 + intensity*50;
    const op = 0.15 + intensity*0.55;
    bubble.style.boxShadow = `0 ${4+intensity*16}px ${spread}px rgba(${gc},${op}), 0 0 ${spread*1.4}px rgba(${gc},${op*0.5})`;
    bubble.style.transform = `scale(${1+intensity*0.1})`;
  });
  bubble.addEventListener('mouseleave',()=>{
    bubble.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
    bubble.style.transform = '';
  });
});

// Also track mouse over entire grid for proximity to each bubble
document.getElementById('socialGrid').addEventListener('mousemove',e=>{
  document.querySelectorAll('.bubble').forEach(bubble=>{
    const gc = bubble.dataset.glow||'255,255,255';
    const r = bubble.getBoundingClientRect();
    const cx = r.left+r.width/2, cy = r.top+r.height/2;
    const dist = Math.sqrt((e.clientX-cx)**2+(e.clientY-cy)**2);
    const maxDist = 160;
    const intensity = Math.max(0, 1 - dist/maxDist);
    if(intensity>0){
      const spread = 18 + intensity*55;
      const op = 0.1 + intensity*0.5;
      bubble.style.boxShadow = `0 ${4+intensity*18}px ${spread}px rgba(${gc},${op}), 0 0 ${spread*1.5}px rgba(${gc},${op*0.4})`;
    }
  });
});
document.getElementById('socialGrid').addEventListener('mouseleave',()=>{
  document.querySelectorAll('.bubble').forEach(b=>{b.style.boxShadow='0 4px 20px rgba(0,0,0,0.3)';});
});

// ── Clock ──
function tick(){
  const n=new Date();
  document.getElementById('tDisp').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mo=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dDisp').textContent=days[n.getDay()]+', '+mo[n.getMonth()]+' '+n.getDate();
}
tick();setInterval(tick,1000);

// ── Weather ──
const WI={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',51:'🌦',61:'🌧',71:'❄️',80:'🌧',95:'⛈'};
const WD={0:'Clear sky',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',51:'Light drizzle',61:'Rain',71:'Snow',80:'Rain showers',95:'Thunderstorm'};
let wxLoaded=false;
async function fetchWX(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.7372&longitude=3.0865&current_weather=true&timezone=Africa%2FAlgiers&forecast_days=1');
    const d=await r.json();
    const t=Math.round(d.current_weather.temperature),c=d.current_weather.weathercode;
    const k=Object.keys(WI).reverse().find(x=>c>=+x)||0;
    document.getElementById('wxTemp').textContent=t+'°C';
    document.getElementById('wxDesc').textContent=WD[k]||'See forecast';
    document.getElementById('wxIcon').textContent=WI[k]||'🌡';
    wxLoaded=true;
  }catch(e){document.getElementById('wxDesc').textContent='Unavailable';}
}
fetchWX();

let showClock=true;
function toggleCW(){
  showClock=!showClock;
  document.getElementById('clockV').style.display=showClock?'':'none';
  document.getElementById('wxV').style.display=showClock?'none':'';
  if(!showClock&&!wxLoaded)fetchWX();
}

// ── Utilities ──
function copyText(txt,msg){
  navigator.clipboard.writeText(txt).catch(()=>{});
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

function openPanel(){document.getElementById('overlay').classList.add('open');document.getElementById('panel').classList.add('open');}
function closePanel(){document.getElementById('overlay').classList.remove('open');document.getElementById('panel').classList.remove('open');}
</script>
